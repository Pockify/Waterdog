name: Build

on:
  workflow_dispatch:
  push:
    tags-ignore:
      - '**'
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        uses: ./.github/actions/build
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          perform_deploy: false
          create_prerelease: false
          prerelease_name: latest
