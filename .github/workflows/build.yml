name: Build

on:
  workflow_dispatch:
  push:
    tags-ignore:
      - '**'
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build jar
        uses: ./.github/actions/build

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: waterdog-jar
          path: build/libs/*.jar
          if-no-files-found: error
