name: Build
description: Build the project without Maven publishing

inputs:
  repo_token:
    description: GitHub token
    required: true
  perform_deploy:
    description: Whether deploy-related steps should run
    required: true
  create_prerelease:
    description: Whether to create/update prerelease artifacts
    required: true
  prerelease_name:
    description: Prerelease label
    required: true

runs:
  using: composite
  steps:
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
        cache: gradle

    - name: Make Gradle executable
      shell: bash
      run: chmod +x ./gradlew

    - name: Build
      shell: bash
      run: ./gradlew build
