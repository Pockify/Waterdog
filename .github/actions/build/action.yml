name: Build
description: Build Waterdog jar

runs:
  using: composite
  steps:
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
        cache: gradle

    - name: Make Gradle executable
      shell: bash
      run: chmod +x ./gradlew

    - name: Build
      shell: bash
      run: ./gradlew clean build

    - name: Show output
      shell: bash
      run: find . -path "*/build/libs/*.jar" -type f
