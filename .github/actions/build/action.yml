name: Build
description: Build Waterdog jar

runs:
  using: composite
  steps:
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
        cache: gradle

    - name: Make Gradle executable
      shell: bash
      run: chmod +x ./gradlew

    - name: Build boot jar
      shell: bash
      run: ./gradlew clean bootJar

    - name: Show output
      shell: bash
      run: ls -la build/libs
